<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400..700;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>DevClub - Conversor de Moedas</title>
</head>
<body>
    <img class="logo" src="./logo.gif" alt="Logo-DevClub-convert-money">
<main>
    <label>
     Converter <b>de:</b>
    <select>
    <option value="R$ Real Brasileiro">R$ Real Brasileiro</option>     
    </select>
    </label>
    <label>
     Converter <b>para:</b>
    <select class="currency-select">
    <option value="dolar">Dólar Americano</option>
    <option value="euro">Euro</option>       
    </select>
    </label>
    <label>
     <b>Valor:</b>
    <input class="input-currency" type="number" placeholder="R$ 10.000,00">
    </label>
        <button class="convert-button">Converter</button>
        <section>
            <div class="currency-box">
                <img class="origin-img" src="./Brasil.png" alt="Logo moeda a converter">
                <p class="currency-name origin-name">Real</p>
                <p class="currency-value-to-convert origin-value">R$ 0,00</p>
            </div>

            <img class="arrow-img" src="./seta.png" alt="Seta">

            <div class="currency-box">
                <img class="currency-image" src="./dolar.png" alt="Logo-moeda-a-convertida">
                <p class="currency-name" id="currency-name">Dólar</p>
                  <p class="currency-value">US$ 0,00</p>
            </div>
        </section>
    </main>
    <script src="./script.js"></script>
